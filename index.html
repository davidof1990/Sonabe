<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonabé! 🎶 - v217 VIBRANT SQUARE</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #fa2d48; --neon: #ff007f; --bg: #121212; --gold: #ffd700; --purple: #a020f0; }
        body { background-color: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; text-align: center; overflow-x: hidden; }
        
        .neon-logo { font-weight: bold; font-size: 2.8rem; text-transform: uppercase; color: #fff; text-shadow: 0 0 10px #fff, 0 0 20px var(--neon); margin-bottom: 5px; }
        .song-count-badge { font-size: 0.8rem; color: #888; margin-bottom: 25px; font-weight: bold; letter-spacing: 1px; }
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 400px; gap: 15px; position: relative; }
        .active { display: flex; }
        
        .btn-list { display: flex; flex-direction: column; gap: 10px; width: 100%; align-items: center; }
        .btn { background: rgba(255,255,255,0.1); border: 1px solid #444; color: #eee; padding: 16px 25px; border-radius: 40px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.85rem; width: 280px; transition: 0.2s; outline: none; box-sizing: border-box; }
        .btn-primary { background-color: var(--primary); border: none; color: white; box-shadow: 0 0 15px var(--primary); }
        .btn-purple { background-color: var(--purple) !important; color: white !important; box-shadow: 0 0 20px var(--purple) !important; border: none !important; }
        .btn-gold { background-color: var(--gold) !important; color: black !important; box-shadow: 0 0 25px var(--gold) !important; border: 2px solid white !important; }
        .btn-outline { border: 1px solid var(--neon); color: var(--neon); background: transparent; }
        
        .fs-btn-top { position: absolute; top: -10px; right: -15px; width: 42px; height: 42px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 10px; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 999; font-size: 1.2rem; }

        /* --- ESCÀNER VIBRANT v217 --- */
        #scanner-container { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:black; z-index: 5000; overflow: hidden; }
        #reader { width: 100% !important; height: 100% !important; border: none !important; }
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        
        /* DAVID: Forcem la invisibilitat dels elements blancs que veies a les fotos */
        #reader__scan_region, #reader__scan_region * { 
            border: none !important; 
            box-shadow: none !important; 
            outline: none !important;
        }
        #reader__dashboard { display: none !important; }

        .scanner-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none; z-index: 5010;
        }
        .scanner-box {
            width: 250px; height: 250px;
            border: 4px solid var(--neon);
            box-shadow: 0 0 30px var(--neon), inset 0 0 15px var(--neon);
            border-radius: 35px;
            position: relative;
        }
        .scan-line {
            position: absolute; width: 100%; height: 3px;
            background: var(--neon); box-shadow: 0 0 15px var(--neon);
            top: 0; animation: scanAnim 2s ease-in-out infinite;
        }
        @keyframes scanAnim { 0% { top: 5%; opacity: 0.2; } 50% { opacity: 1; } 100% { top: 95%; opacity: 0.2; } }

        /* REPRODUCTOR */
        .play-container { position: relative; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; margin: 10px 0; }
        #play-btn-main { width: 90px; height: 90px; flex-shrink: 0; background-color: var(--primary); border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2; box-shadow: 0 0 15px var(--primary); }
        .progress-ring { position: absolute; top: 0; left: 0; transform: rotate(-90deg); z-index: 1; }
        .progress-ring__circle { stroke: white; stroke-linecap: round; }

        .search-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 10px; text-align: left; border: 1px solid #333; display: flex; align-items: center; gap: 12px; }
        .preview-btn-small { width: 38px; height: 38px; min-width: 38px; border-radius: 50%; border: none; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .play-icon-small { width: 0; height: 0; border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-left: 8px solid white; margin-left: 3px; }
        .stop-icon-small { width: 10px; height: 10px; background: white; border-radius: 2px; }

        #loading-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .config-group { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 15px; width: 100%; box-sizing: border-box; }
        .text-input-field { width: 250px; padding: 15px; font-size: 1.1rem; border-radius: 10px; border: 2px solid var(--neon); background: #222; color: white; text-align: center; margin-bottom: 10px; outline: none; }
    </style>
</head>
<body>
    <div id="loading-overlay"><div class="spinner"></div><p id="loading-text" style="margin-top:15px;">CARREGANT...</p></div>
    
    <div id="scanner-container">
        <div id="reader"></div>
        <div class="scanner-overlay">
            <div class="scanner-box"><div class="scan-line"></div></div>
            <p style="margin-top: 30px; font-weight: bold; color: var(--neon); text-shadow: 0 0 10px var(--neon);">ENQUADRA EL BIDI</p>
        </div>
        <button class="btn" style="position:absolute; bottom:50px; left:50%; transform:translateX(-50%); z-index: 5200; background: #333; border: 1px solid var(--neon);" onclick="stopScanner()">CANCEL·LAR</button>
    </div>

    <div id="landing-screen" class="screen active">
        <div id="fs-btn" class="fs-btn-top" onclick="toggleFullscreen()">⛶</div>
        <div class="neon-logo">Sonabé!</div>
        <div id="total-songs-display" class="song-count-badge">CONNECTANT...</div>
        <div class="btn-list">
            <button class="btn btn-primary" onclick="startScanner()">Tinc les cartes! 📷</button>
            <button class="btn btn-outline" onclick="openSetup()">Jugar en línia 🎲</button>
            <button class="btn" style="border-color: var(--gold); color: var(--gold);" onclick="openPublicSearch()">Cercador cançons 🔍</button>
            <button class="btn" onclick="resetGame()">Reiniciar Tot</button>
            <div style="margin-top: 30px; opacity: 0.2; cursor: pointer; font-size: 0.8rem;" onclick="checkAdminAccess()">⚙️ ADMIN</div>
        </div>
    </div>

    <div id="public-search-screen" class="screen">
        <div class="neon-logo" style="font-size: 1.8rem;">Cercador</div>
        <div class="config-group"><input type="text" id="public-search-input" class="text-input-field" placeholder="Grup o cançó..." oninput="performPublicSearch()"></div>
        <div id="public-search-results" style="width: 100%; max-height: 400px; overflow-y: auto;"></div>
        <button class="btn" onclick="closePublicSearch()">Tornar al Menú</button>
    </div>

    <div id="admin-screen" class="screen">
        <div class="neon-logo" style="font-size: 1.8rem;">Cercador iTunes</div>
        <div class="config-group"><input type="text" id="admin-search-input" class="text-input-field" placeholder="Títol, artista..." style="width: 85%;"><button class="btn btn-primary" onclick="searchITunes()">BUSCAR CANÇÓ</button></div>
        <div id="admin-results" style="width: 100%; max-height: 400px; overflow-y: auto;"></div>
        <button class="btn" onclick="closeAdmin()">Tornar al Menú</button>
    </div>

    <div id="setup-screen" class="screen">
        <div class="neon-logo" style="font-size: 2.2rem;">Configuració</div>
        <div style="display:flex; gap:10px; width: 280px;"><input type="text" id="player-input" placeholder="Nom jugador..." style="flex:1; padding:12px; border-radius:10px; background:#222; color:white; border:1px solid var(--neon);"><button class="btn btn-primary" onclick="addPlayer()" style="width:60px; padding:0;">+</button></div>
        <div id="player-list-setup" style="width:100%; margin:10px 0;"></div>
        <div id="config-area" style="display:none; width: 100%;">
            <div class="config-group"><p style="font-size:0.75rem; font-weight:bold; color:#888;">CARTES PER GUANYAR:</p><input type="number" id="win-input" min="2" max="20" oninput="updateWinCondition()" style="width:80px; padding:10px; border-radius:10px; background:#222; color:white; text-align:center; border:1px solid #444;"></div>
            <div class="config-group"><p style="font-size:0.75rem; font-weight:bold; color:#888;">MODE PRESSIÓ:</p><div style="display:flex; gap:5px; justify-content:center;"><button id="p-off" class="btn" style="width:60px; padding:10px;" onclick="setPressure(0)">OFF</button><button id="p-15" class="btn" style="width:60px; padding:10px;" onclick="setPressure(15)">15s</button><button id="p-20" class="btn" style="width:60px; padding:10px;" onclick="setPressure(20)">20s</button><button id="p-30" class="btn" style="width:60px; padding:10px;" onclick="setPressure(30)">30s</button></div></div>
            <div class="btn-list">
                <button id="mode-timeline" class="btn" onclick="setMode('timeline')">LÍNIA DEL TEMPS</button>
                <button id="mode-exact" class="btn" onclick="setMode('exact')">ANY EXACTE</button>
                <button id="mode-song" class="btn" onclick="setMode('song')">CANÇÓ</button>
                <button id="mode-artist" class="btn" onclick="setMode('artist')">GRUP</button>
                <button class="btn btn-primary" style="margin-top:10px;" onclick="startGame()">COMENÇAR JOC</button>
            </div>
        </div>
        <button class="btn" onclick="showScreen('landing-screen')">Tornar</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="turn-indicator-bar" style="background: var(--primary); color: white; padding: 12px; border-radius: 10px; font-weight: 900; width: 100%; display: flex; justify-content: center; align-items: center;"><span id="turn-text">...</span><span id="pressure-timer-display" style="display:none;">⏱️ 00</span></div>
        <div class="play-container"><svg class="progress-ring" width="110" height="110"><circle class="progress-ring__circle" stroke-width="5" fill="transparent" r="52" cx="55" cy="55" /></svg><button id="play-btn-main" onclick="handlePlayClick()"><div id="icon-play" style="width: 0; height: 0; border-top: 18px solid transparent; border-bottom: 18px solid transparent; border-left: 28px solid white; margin-left: 8px;"></div><div id="icon-stop" style="width: 30px; height: 30px; background-color: white; border-radius: 4px; display: none;"></div></button></div>
        <div id="ui-timeline-mode" class="btn-list" style="display:none;"><div id="timeline-slots" style="display:flex; gap:5px; flex-wrap:wrap; justify-content:center;"></div></div>
        <div id="ui-input-mode" class="btn-list" style="display:none;"><input type="text" id="game-text-input" class="text-input-field" placeholder=""><button class="btn btn-primary" onclick="processInputGuess()">COMPROVAR</button></div>
        <div id="solution-card" style="display:none; flex-direction:column; align-items:center; width: 100%;">
            <div id="guess-result" style="font-weight:bold; font-size:1.5rem; margin-bottom:10px;"></div>
            <div id="song-details" style="display:none; flex-direction:column; align-items:center;">
                <div id="song-year" style="background:white; color:black; font-weight:900; font-size:2.5rem; padding:5px 30px; border-radius:10px;">----</div>
                <img id="album-img" style="width:160px; height:160px; border-radius:12px; box-shadow:0 5px 20px rgba(0,0,0,0.5); margin:10px 0;">
                <div id="song-title" style="font-weight:bold;"></div>
                <div id="song-artist" style="color:var(--primary);"></div>
            </div>
            <div id="action-buttons" class="btn-list" style="margin-top:15px;">
                <button id="btn-reveal-physical" class="btn btn-primary" style="display:none;" onclick="revealPhysicalSolution()">MOSTRAR SOLUCIÓ</button>
                <button id="btn-rob" class="btn btn-purple" style="display:none;" onclick="executeRobbery()">ROBAR CARTA 🚨</button>
                <button id="btn-next" class="btn btn-primary" style="display:none;" onclick="nextAction()">Següent Cançó</button>
                <div id="winner-actions" style="display:none; flex-direction:column; gap:10px;"><button class="btn btn-gold" onclick="playAgain()">JUGAR DE NOU</button><button class="btn" onclick="resetGame()">REINICIAR</button></div>
            </div>
        </div>
        <div id="game-board-container" style="width: 100%; margin-top: 20px;"></div>
        <button class="btn" style="margin-top:10px;" onclick="goToMenu()">Menú Principal</button>
    </div>

    <audio id="audio-player" preload="auto"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        let adminPreviewAudio = new Audio(); let currentAdminBtn = null;
        let publicPreviewAudio = new Audio(); let currentPublicBtn = null;
        let html5QrCode = null, fadeInterval = null, animationFrame = null, pressureInterval = null;
        let currentYear = null, isFadingOutAuto = false, allExistingIds = [];
        let databaseSongs = []; 
        let gameState = { players: [], currentTurn: 0, originalTurn: 0, mode: 'timeline', playedIds: [], winCondition: 5, isRobberyActive: false, robbersTried: [], pendingWinner: null, isOnline: false, pressureMode: 0 };

        const KEY = 'sonabe_v217';
        const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTSKbhu-nwl5Mrq1-_WiGPQyiflqbb3a5C9BRTTDWgwMNqTur9_8GBODKlJC9-OHol7EhIzap9Yv_lF/pub?output=csv";
        const ADMIN_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_jcMVHYvfhsHF5G8oLVym9RiNVMT25txw8asWEQDFcYf0trXkTOysUj0ujSA4hJ0F/exec"; 

        const circle = document.querySelector('.progress-ring__circle');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = circumference;

        function setProgress(percent) { const offset = circumference - (percent / 100 * circumference); circle.style.strokeDashoffset = offset; }
        function updateSmoothProgress() {
            if (!audio.paused && audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                const remaining = audio.duration - audio.currentTime;
                setProgress(percent);
                if (remaining < 2 && !isFadingOutAuto) { isFadingOutAuto = true; performFadeOut(); }
                if (remaining < 5) { circle.style.stroke = "var(--primary)"; const blink = Math.floor(audio.currentTime * 4) % 2; circle.style.opacity = blink ? "1" : "0.2"; } 
                else { circle.style.stroke = "white"; circle.style.opacity = "1"; }
                animationFrame = requestAnimationFrame(updateSmoothProgress);
            }
        }

        function toggleFullscreen() {
            const btn = document.getElementById('fs-btn');
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen().then(() => btn.innerHTML = "✕").catch(e => {}); } 
            else { if (document.exitFullscreen) document.exitFullscreen().then(() => btn.innerHTML = "⛶"); }
        }

        function openPublicSearch() { showScreen('public-search-screen'); document.getElementById('public-search-input').value = ""; document.getElementById('public-search-results').innerHTML = ""; }
        function closePublicSearch() { stopPublicPreview(); showScreen('landing-screen'); }
        function stopPublicPreview() { publicPreviewAudio.pause(); if (currentPublicBtn) currentPublicBtn.innerHTML = '<div class="play-icon-small"></div>'; currentPublicBtn = null; }

        async function togglePublicPreview(id, btn) {
            if (currentPublicBtn === btn) { stopPublicPreview(); return; }
            stopPublicPreview(); currentPublicBtn = btn; btn.innerHTML = "⏳";
            try {
                const r = await fetch(`https://itunes.apple.com/lookup?id=${id}&country=es`);
                const d = await r.json();
                if (d.results && d.results[0].previewUrl) {
                    btn.innerHTML = '<div class="stop-icon-small"></div>';
                    publicPreviewAudio.src = d.results[0].previewUrl; publicPreviewAudio.play();
                    publicPreviewAudio.onended = () => stopPublicPreview();
                } else btn.innerHTML = "❌";
            } catch(e) { btn.innerHTML = "❌"; }
        }

        function performPublicSearch() {
            const term = normalizeString(document.getElementById('public-search-input').value);
            const container = document.getElementById('public-search-results');
            if (!term || term.length < 2) { container.innerHTML = ""; return; }
            const matches = databaseSongs.filter(s => normalizeString(s.title).includes(term) || normalizeString(s.artist).includes(term)).slice(0, 30);
            container.innerHTML = matches.length ? matches.map(s => `
                <div class="search-item">
                    <button class="preview-btn-small" onclick="togglePublicPreview('${s.id}', this)"><div class="play-icon-small"></div></button>
                    <div style="flex:1"><b style="color: white; font-size: 0.85rem;">${s.title}</b><br><span style="color: var(--primary); font-size: 0.75rem;">${s.artist} (${s.year})</span></div>
                </div>
            `).join('') : '<p style="color: #666; font-size: 0.8rem; margin-top: 20px;">No hi ha coincidències.</p>';
        }

        function checkAdminAccess() { const pass = prompt("Contrasenya admin:"); if (pass === "admin") showScreen('admin-screen'); else if (pass !== null) alert("Accés denegat"); }
        function closeAdmin() { stopAdminPreview(); showScreen('landing-screen'); loadTotalCount(); }
        function stopAdminPreview() { adminPreviewAudio.pause(); if (currentAdminBtn) currentAdminBtn.innerHTML = '<div class="admin-play-icon"></div>'; currentAdminBtn = null; }
        function toggleAdminPreview(url, btn) { if (currentAdminBtn === btn) { stopAdminPreview(); return; } stopAdminPreview(); currentAdminBtn = btn; btn.innerHTML = '<div class="admin-stop-icon"></div>'; adminPreviewAudio.src = url; adminPreviewAudio.play(); adminPreviewAudio.onended = () => stopAdminPreview(); }
        async function searchITunes() {
            const term = document.getElementById('admin-search-input').value; if (!term) return;
            stopAdminPreview(); showLoader("Buscant...");
            try {
                const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=song&limit=20&country=es`);
                const d = await r.json(); const container = document.getElementById('admin-results'); container.innerHTML = "";
                d.results.forEach(s => {
                    const sid = s.trackId.toString(); const exists = allExistingIds.includes(sid);
                    const card = document.createElement('div'); card.id = `result-${sid}`; card.className = `admin-result-card ${exists ? 'admin-exists' : ''}`;
                    card.innerHTML = `<button class="admin-preview-btn" onclick="toggleAdminPreview('${s.previewUrl}', this)"><div class="admin-play-icon"></div></button><img src="${s.artworkUrl100}"><div style="flex:1"><b style="font-size:0.8rem">${s.trackName}</b><br><span style="font-size:0.7rem; color:#888">${s.artistName} (${s.releaseDate.substring(0,4)})</span><div id="status-${sid}">${exists ? '<span style="color:var(--primary);font-size:0.6rem;font-weight:bold;">EXISTENT</span>' : ''}</div></div><div id="action-${sid}">${!exists ? `<button class="btn btn-primary" style="width: auto; padding: 10px;" onclick='addSongToSheet(${JSON.stringify(s).replace(/'/g, "&apos;")})'>AFEGIR</button>` : ''}</div>`;
                    container.appendChild(card);
                });
            } catch(e) { alert("Error"); } finally { hideLoader(); }
        }
        async function addSongToSheet(s) {
            const sid = s.trackId.toString(); const actionDiv = document.getElementById(`action-${sid}`); actionDiv.innerHTML = "⏳";
            const payload = { artista: s.artistName, titol: s.trackName, album: s.collectionName || "Single", any: s.releaseDate.substring(0,4), link: s.trackViewUrl, id: sid, genere: s.primaryGenreName };
            try { await fetch(ADMIN_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }); allExistingIds.push(sid); document.getElementById(`status-${sid}`).innerHTML = '<span style="color:#28a745;font-size:0.7rem;font-weight:bold;">✅ ENVIADA!</span>'; document.getElementById(`result-${sid}`).classList.add('admin-exists'); actionDiv.innerHTML = ""; } catch(e) { alert("Error"); actionDiv.innerHTML = `<button class="btn" onclick='addSongToSheet(${JSON.stringify(s).replace(/'/g, "&apos;")})'>REINTENTAR</button>`; }
        }

        function save() { localStorage.setItem(KEY, JSON.stringify(gameState)); }
        function load() { const s = localStorage.getItem(KEY); if(s) { try { gameState = JSON.parse(s); } catch(e){} } }
        window.onload = () => { load(); showScreen('landing-screen'); loadTotalCount(); };
        async function loadTotalCount() {
            try {
                const r = await fetch(SHEET_CSV + "&t=" + Date.now()); const t = await r.text();
                const lines = t.split("\n").filter(l => l.trim() !== "");
                databaseSongs = lines.slice(1).map(l => { const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); return { title: c[0]||"", artist: c[1]||"", year: c[3]||"", id: c[5]||"" }; }).filter(s => s.id);
                allExistingIds = databaseSongs.map(s => s.id); document.getElementById('total-songs-display').innerText = `${allExistingIds.length} CANÇONS DISPONIBLES`;
            } catch(e) { document.getElementById('total-songs-display').innerText = "DATABASE ONLINE"; }
        }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function showLoader(txt) { document.getElementById('loading-overlay').style.display = 'flex'; document.getElementById('loading-text').innerText = txt; }
        function hideLoader() { document.getElementById('loading-overlay').style.display = 'none'; }
        function resetPlayIcons() { document.getElementById('icon-play').style.display = 'block'; document.getElementById('icon-stop').style.display = 'none'; cancelAnimationFrame(animationFrame); circle.style.stroke = "white"; circle.style.opacity = "1"; setProgress(0); }
        function handlePlayClick() {
            const pi = document.getElementById('icon-play'), si = document.getElementById('icon-stop'); clearInterval(fadeInterval);
            if (audio.paused) { pi.style.display = 'none'; si.style.display = 'block'; audio.volume = 0; audio.play().then(() => { updateSmoothProgress(); startPressureTimer(); fadeInterval = setInterval(() => { if (audio.volume < 0.9) audio.volume += 0.1; else clearInterval(fadeInterval); }, 50); }).catch(() => resetPlayIcons()); } else performFadeOut();
        }
        function performFadeOut(callback) { clearInterval(fadeInterval); fadeInterval = setInterval(() => { if (audio.volume > 0.1) audio.volume -= 0.1; else { audio.pause(); audio.volume = 1; resetPlayIcons(); clearInterval(fadeInterval); if (callback) callback(); } }, 50); }
        audio.onended = () => resetPlayIcons();
        function openSetup() { showScreen('setup-screen'); updateSetupList(); }
        function addPlayer() { const name = document.getElementById('player-input').value.trim(); if (name) { gameState.players.push({ name: name, cards: [] }); document.getElementById('player-input').value = ""; save(); updateSetupList(); } }
        function updateSetupList() {
            const list = document.getElementById('player-list-setup'); if(!list) return;
            list.innerHTML = gameState.players.map((p, i) => `<div style="display:flex; justify-content:space-between; background:rgba(255,255,255,0.05); padding:10px; margin:5px; border-radius:8px;"><span>👤 ${p.name.toUpperCase()}</span><span style="color:red; cursor:pointer;" onclick="gameState.players.splice(${i},1);save();updateSetupList();">✕</span></div>`).join('');
            document.getElementById('config-area').style.display = gameState.players.length > 0 ? 'block' : 'none';
            document.getElementById('win-input').value = gameState.winCondition; setMode(gameState.mode || 'timeline'); setPressure(gameState.pressureMode || 0);
        }
        function updateWinCondition() { gameState.winCondition = parseInt(document.getElementById('win-input').value) || 5; save(); }
        function setPressure(sec) { gameState.pressureMode = sec; ['p-off', 'p-15', 'p-20', 'p-30'].forEach(b => document.getElementById(b).className = 'btn'); document.getElementById(sec === 0 ? 'p-off' : 'p-' + sec).className = 'btn mode-selected'; save(); }
        function startPressureTimer() {
            if (gameState.pressureMode <= 0 || gameState.isRobberyActive) return;
            clearInterval(pressureInterval); let timeLeft = gameState.pressureMode;
            const display = document.getElementById('pressure-timer-display'); display.style.display = 'inline-block'; display.innerText = `⏱️ ${timeLeft}`;
            pressureInterval = setInterval(() => { timeLeft--; display.innerText = `⏱️ ${timeLeft}`; display.style.color = (timeLeft <= 5) ? "var(--primary)" : "var(--gold)"; if (timeLeft <= 0) { clearInterval(pressureInterval); processResult(false); } }, 1000);
        }
        function stopPressureTimer() { clearInterval(pressureInterval); if(document.getElementById('pressure-timer-display')) document.getElementById('pressure-timer-display').style.display = 'none'; }
        function setMode(m) { gameState.mode = m; ['mode-timeline','mode-exact','mode-song','mode-artist'].forEach(id => document.getElementById(id).className = 'btn'); document.getElementById('mode-' + m).className = 'btn mode-selected'; save(); }
        function startGame() { gameState.isOnline = true; if (gameState.playedIds.length === 0) gameState.players.forEach(p => p.cards = [1960 + Math.floor(Math.random()*60)]); save(); fetchNextSong(); }
        async function fetchNextSong() { showLoader("Buscant cançó..."); try { const r = await fetch(SHEET_CSV + "&t=" + Date.now()); const t = await r.text(); const lines = t.split("\n").filter(l => l.trim() !== "").slice(1); const avail = lines.map(l => { const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); return { id: c[5]||"", year: parseInt(c[3]) }; }).filter(s => s.id && !gameState.playedIds.includes(s.id)); const sel = avail[Math.floor(Math.random()*avail.length)]; gameState.playedIds.push(sel.id); loadSong(sel.id, sel.year); } catch(e) { hideLoader(); } }
        async function loadSong(id, sheetYear = null) {
            showLoader("Carregant música..."); showScreen('game-screen'); resetPlayIcons(); stopPressureTimer(); isFadingOutAuto = false;
            try {
                const ri = await fetch(`https://itunes.apple.com/lookup?id=${id}&country=es`); const di = await ri.json(); const s = di.results[0];
                audio.src = s.previewUrl; audio.load(); document.getElementById('album-img').src = s.artworkUrl100.replace('100x100','600x600');
                currentSongName = s.trackName; currentArtistName = s.artistName; document.getElementById('song-title').innerText = currentSongName; document.getElementById('song-artist').innerText = currentArtistName;
                currentYear = sheetYear || parseInt(s.releaseDate.substring(0,4)); document.getElementById('song-year').innerText = currentYear; renderGameUI();
            } catch(e) { hideLoader(); } finally { hideLoader(); }
        }
        function renderGameUI() {
            document.getElementById('solution-card').style.display = 'none'; document.getElementById('song-details').style.display = 'none'; document.getElementById('btn-rob').style.display = 'none'; document.getElementById('btn-next').style.display = 'none'; document.getElementById('btn-reveal-physical').style.display = 'none'; document.getElementById('winner-actions').style.display = 'none'; document.getElementById('ui-timeline-mode').style.display = 'none'; document.getElementById('ui-input-mode').style.display = 'none';
            if (gameState.isOnline) {
                const p = gameState.players[gameState.currentTurn]; document.getElementById('turn-text').innerText = gameState.isRobberyActive ? `🚨 ROBATORI: ${p.name.toUpperCase()}` : `TORN DE: ${p.name.toUpperCase()}`;
                if (gameState.mode === 'timeline') { document.getElementById('ui-timeline-mode').style.display = 'block'; renderTimelineSlots(gameState.isRobberyActive ? gameState.players[gameState.originalTurn] : p); } 
                else { document.getElementById('ui-input-mode').style.display = 'block'; document.getElementById('game-text-input').value = ""; }
                renderBoards();
            } else { document.getElementById('turn-text').innerText = "MODE FÍSIC"; document.getElementById('solution-card').style.display = 'flex'; document.getElementById('guess-result').innerText = "CARTA ESCANEJADA"; document.getElementById('btn-reveal-physical').style.display = 'block'; }
        }
        function revealPhysicalSolution() { document.getElementById('song-details').style.display = 'flex'; document.getElementById('btn-reveal-physical').style.display = 'none'; document.getElementById('btn-next').style.display = 'block'; document.getElementById('guess-result').innerText = "SOLUCIÓ"; }
        function renderTimelineSlots(p) { const container = document.getElementById('timeline-slots'); container.innerHTML = ""; const s = [...p.cards].sort((a,b) => a-b); container.innerHTML += `<button class="btn" style="width:70px;padding:5px;" onclick="checkGuess(-1)">ANTIC</button>`; s.forEach((y, i) => { container.innerHTML += `<div style="background:white;color:black;padding:4px 8px;border-radius:6px;font-weight:bold;font-size:0.8rem;">${y}</div><button class="btn" style="width:70px;padding:5px;" onclick="checkGuess(${i})">${(i === s.length-1) ? 'NOU' : 'ENTRE'}</button>`; }); }
        function normalizeString(str) { return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim(); }
        function processInputGuess() { const val = document.getElementById('game-text-input').value; if (!val) return; let isOk = false; if (gameState.mode === 'exact') isOk = (parseInt(val) === currentYear); else if (gameState.mode === 'song') isOk = (normalizeString(val) === normalizeString(currentSongName)); else if (gameState.mode === 'artist') isOk = (normalizeString(val) === normalizeString(currentArtistName)); processResult(isOk); }
        function checkGuess(idx) { const p = gameState.isRobberyActive ? gameState.players[gameState.originalTurn] : gameState.players[gameState.currentTurn]; const s = [...p.cards].sort((a,b) => a-b); let ok = (idx === -1) ? (currentYear <= s[0]) : (idx === s.length-1) ? (currentYear >= s[s.length-1]) : (currentYear >= s[idx] && currentYear <= s[idx+1]); processResult(ok); }
        function processResult(isOk) { stopPressureTimer(); const thief = gameState.players[gameState.currentTurn]; if (isOk) { thief.cards.push(currentYear); const win = (thief.cards.length >= gameState.winCondition); if (win) gameState.pendingWinner = thief.name; save(); revealUI(true, false, win); } else { if (!gameState.isRobberyActive) { gameState.originalTurn = gameState.currentTurn; gameState.robbersTried = [gameState.currentTurn]; } else gameState.robbersTried.push(gameState.currentTurn); let nextR = -1; for (let i=1; i<gameState.players.length; i++) { let c = (gameState.originalTurn + i) % gameState.players.length; if (!gameState.robbersTried.includes(c)) { nextR = c; break; } } if (nextR !== -1) { gameState.nextRobberIdx = nextR; save(); revealUI(false, true, false); } else { save(); revealUI(false, false, false); } } }
        function revealUI(correct, canRob, win) { document.getElementById('ui-timeline-mode').style.display = 'none'; document.getElementById('ui-input-mode').style.display = 'none'; document.getElementById('solution-card').style.display = 'flex'; const res = document.getElementById('guess-result'); if (correct) { document.getElementById('song-details').style.display = "flex"; if (win) { res.innerHTML = "🏆 VICTÒRIA!"; res.style.color = "#ffd700"; document.getElementById('winner-actions').style.display = "flex"; confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } }); } else { res.innerText = "✅ ENCERTAT!"; res.style.color = "#28a745"; document.getElementById('btn-next').style.display = "block"; } } else { res.innerText = "❌ INCORRECTE"; res.style.color = "#fa2d48"; if (canRob) document.getElementById('btn-rob').style.display = "block"; else { document.getElementById('song-details').style.display = "flex"; document.getElementById('btn-next').style.display = "block"; } } }
        function executeRobbery() { gameState.currentTurn = gameState.nextRobberIdx; gameState.isRobberyActive = true; save(); renderGameUI(); }
        function nextAction() { performFadeOut(() => { if (!gameState.isOnline) { startScanner(); return; } gameState.currentTurn = (gameState.originalTurn + 1) % gameState.players.length; gameState.originalTurn = gameState.currentTurn; gameState.isRobberyActive = false; gameState.robbersTried = []; save(); fetchNextSong(); }); }
        function playAgain() { performFadeOut(() => { gameState.playedIds = []; gameState.players.forEach(p => p.cards = []); gameState.currentTurn = 0; gameState.originalTurn = 0; gameState.pendingWinner = null; save(); startGame(); }); }
        function renderBoards() { const container = document.getElementById('game-board-container'); if(!container) return; container.style.display = 'block'; container.innerHTML = `<h3>Objectiu: ${gameState.winCondition}</h3>`; gameState.players.forEach((p, i) => { const act = (i === (gameState.isRobberyActive ? gameState.originalTurn : gameState.currentTurn)) ? 'active-row' : ''; container.innerHTML += `<div class="player-row ${act}"><div style="font-size:0.75rem; font-weight:bold; color:var(--primary);">${p.name.toUpperCase()} (${p.cards.length})</div><div style="display:flex; gap:4px; flex-wrap:wrap;">${[...p.cards].sort((a,b)=>a-b).map(y => `<div style="background:white; color:black; padding:2px 6px; border-radius:4px; font-size:0.65rem; font-weight:bold;">${y}</div>`).join('')}</div></div>`; }); }
        function resetGame() { performFadeOut(() => { localStorage.removeItem(KEY); window.location.reload(); }); }
        function goToMenu() { performFadeOut(() => { window.location.reload(); }); }

        // --- ESCÀNER VIBRANT v217 ---
        function startScanner() { 
            audio.play().then(() => audio.pause()).catch(() => {});
            document.getElementById('scanner-container').style.display = 'block'; 
            html5QrCode = new Html5Qrcode("reader"); 
            // DAVID: Forcem mides 250x250 per evitar rectangles alts
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 20, qrbox: { width: 250, height: 250 } }, 
                (text) => { 
                    const id = new URLSearchParams(text.split('?')[1]).get('id'); 
                    if (id) { 
                        // VIBRACIÓ!
                        if (navigator.vibrate) navigator.vibrate(200);
                        stopScanner(); gameState.isOnline = false; loadSong(id); 
                    } 
                }
            ).catch(() => stopScanner()); 
        }
        function stopScanner() { if (html5QrCode) html5QrCode.stop().then(() => { document.getElementById('scanner-container').style.display = 'none'; }); }
    </script>
</body>
