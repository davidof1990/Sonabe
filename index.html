<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonabé! 🎶 - v223 ADMIN RESTORE</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #fa2d48; --neon: #ff007f; --bg: #121212; --gold: #ffd700; --purple: #a020f0; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; text-align: center; overflow-x: hidden; }
        
        .neon-logo { font-weight: bold; font-size: 2.8rem; text-transform: uppercase; text-shadow: 0 0 10px #fff, 0 0 20px var(--neon); margin-bottom: 5px; }
        .song-count-badge { font-size: 0.8rem; color: #888; margin-bottom: 25px; font-weight: bold; letter-spacing: 1px; }
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 400px; gap: 15px; position: relative; }
        .active { display: flex; }
        
        .btn-list { display: flex; flex-direction: column; gap: 10px; width: 100%; align-items: center; }
        .btn { background: rgba(255,255,255,0.1); border: 1px solid #444; color: #eee; padding: 16px 25px; border-radius: 40px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.85rem; width: 280px; transition: 0.2s; outline: none; box-sizing: border-box; }
        .btn-primary { background: var(--primary); border: none; box-shadow: 0 0 15px var(--primary); color: white; }
        .btn-purple { background: var(--purple) !important; box-shadow: 0 0 20px var(--purple) !important; border: none !important; }
        .btn-gold { background: var(--gold) !important; color: black !important; box-shadow: 0 0 25px var(--gold) !important; border: 2px solid white !important; }
        .mode-selected { background: var(--neon) !important; color: white !important; border: 2px solid white !important; box-shadow: 0 0 20px var(--neon); }
        
        /* ADMIN CARDS RESTAURADES */
        .admin-result-card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid #333; width: 100%; box-sizing: border-box; text-align: left; }
        .admin-exists { border-color: var(--primary) !important; opacity: 0.8; }
        .admin-preview-btn { width: 35px; height: 35px; border-radius: 50%; border: none; background: #444; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .admin-play-icon { width: 0; height: 0; border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-left: 8px solid white; margin-left: 2px; }
        .admin-stop-icon { width: 10px; height: 10px; background: white; border-radius: 2px; }

        /* ESCÀNER FUSION v223 */
        #scanner-container { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:black; z-index: 5000; overflow: hidden; }
        #reader { width: 100% !important; height: 100% !important; border: none !important; }
        #reader video { object-fit: cover !important; }
        #reader__scan_region { border: 4px solid var(--neon) !important; box-shadow: 0 0 25px var(--neon), inset 0 0 15px var(--neon) !important; border-radius: 35px !important; overflow: hidden !important; }
        #reader__scan_region > div { display: none !important; }
        #reader__dashboard { display: none !important; }
        .scanner-visual-effects { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 5010; }
        .scan-line-container { width: 250px; height: 250px; position: relative; }
        .scan-line { position: absolute; width: 100%; height: 3px; background: var(--neon); box-shadow: 0 0 15px var(--neon); top: 0; animation: scanAnim 2s ease-in-out infinite; }
        @keyframes scanAnim { 0% { top: 5%; opacity: 0.3; } 50% { opacity: 1; } 100% { top: 95%; opacity: 0.3; } }

        /* REPRODUCTOR */
        .play-container { position: relative; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; margin: 10px 0; }
        #play-btn-main { width: 90px; height: 90px; flex-shrink: 0; background: var(--primary); border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2; box-shadow: 0 0 15px var(--primary); }
        .progress-ring { position: absolute; top: 0; left: 0; transform: rotate(-90deg); z-index: 1; }
        .progress-ring__circle { stroke: white; stroke-linecap: round; }
        .player-row { background: #1e1e1e; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid var(--primary); text-align: left; width: 100%; box-sizing: border-box; }
        .active-row { border: 2px solid white !important; box-shadow: 0 0 15px var(--primary); }
        .text-input-field { width: 250px; padding: 15px; font-size: 1.1rem; border-radius: 10px; border: 2px solid var(--neon); background: #222; color: white; text-align: center; margin-bottom: 10px; outline: none; }
        .search-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 10px; text-align: left; border: 1px solid #333; display: flex; align-items: center; gap: 12px; }
        .preview-btn-small { width: 38px; height: 38px; border-radius: 50%; border: none; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #loading-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .config-group { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 15px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="loading-overlay"><div class="spinner"></div><p id="loading-text" style="margin-top:15px;">CARREGANT...</p></div>
    
    <div id="scanner-container">
        <div id="reader"></div>
        <div class="scanner-visual-effects">
            <div class="scan-line-container"><div class="scan-line"></div></div>
            <p style="margin-top: 30px; font-weight: bold; color: var(--neon); text-shadow: 0 0 10px var(--neon);">ENQUADRA EL BIDI</p>
        </div>
        <button class="btn" style="position:absolute; bottom:50px; left:50%; transform:translateX(-50%); z-index: 5200; background: #333; border: 1px solid var(--neon);" onclick="stopScanner()">CANCEL·LAR</button>
    </div>

    <div id="landing-screen" class="screen active">
        <div class="neon-logo">Sonabé!</div>
        <div id="total-songs-display" class="song-count-badge">CONNECTANT...</div>
        <div class="btn-list">
            <button class="btn btn-primary" onclick="startScanner()">Tinc les cartes! 📷</button>
            <button class="btn btn-outline" onclick="openSetup()">Jugar en línia 🎲</button>
            <button class="btn" style="border-color: var(--gold); color: var(--gold);" onclick="openPublicSearch()">Cercador cançons 🔍</button>
            <button class="btn" onclick="resetGame()">Reiniciar Tot</button>
            <div style="margin-top: 30px; opacity: 0.2; cursor: pointer; font-size: 0.8rem;" onclick="checkAdminAccess()">⚙️ ADMIN</div>
        </div>
    </div>

    <div id="public-search-screen" class="screen">
        <div class="neon-logo" style="font-size: 1.8rem;">Cercador</div>
        <div class="config-group"><input type="text" id="public-search-input" class="text-input-field" placeholder="Grup o cançó..." oninput="performPublicSearch()"></div>
        <div id="public-search-results" style="width: 100%; max-height: 400px; overflow-y: auto;"></div>
        <button class="btn" onclick="closePublicSearch()">Tornar al Menú</button>
    </div>

    <div id="admin-screen" class="screen">
        <div class="neon-logo" style="font-size: 1.8rem;">Admin iTunes</div>
        <div class="config-group">
            <input type="text" id="admin-search-input" class="text-input-field" placeholder="Busca per afegir..." style="width: 85%;">
            <button class="btn btn-primary" onclick="searchITunes()">BUSCAR</button>
        </div>
        <div id="admin-results" style="width: 100%; max-height: 400px; overflow-y: auto;"></div>
        <button class="btn" onclick="closeAdmin()">Tornar al Menú</button>
    </div>

    <div id="setup-screen" class="screen">
        <div class="neon-logo" style="font-size: 2.2rem;">Configuració</div>
        <div style="display:flex; gap:10px; width: 280px;"><input type="text" id="player-input" placeholder="Nom jugador..." style="flex:1; padding:12px; border-radius:10px; background:#222; color:white; border:1px solid var(--neon);"><button class="btn btn-primary" onclick="addPlayer()" style="width:60px; padding:0;">+</button></div>
        <div id="player-list-setup" style="width:100%; margin:10px 0;"></div>
        <div id="config-area" style="display:none; width: 100%;">
            <div class="config-group"><p style="font-size:0.75rem; font-weight:bold; color:#888;">CARTES PER GUANYAR:</p><input type="number" id="win-input" min="2" max="20" oninput="updateWinCondition()" style="width:80px; padding:10px; border-radius:10px; background:#222; color:white; text-align:center; border:1px solid #444;"></div>
            <div class="config-group">
                <p style="font-size:0.75rem; font-weight:bold; color:#888;">MODE PRESSIÓ:</p>
                <div style="display:flex; gap:5px; justify-content:center; flex-wrap: wrap;">
                    <button id="p-off" class="btn" style="width:65px; padding:10px;" onclick="setPressure(0)">OFF</button>
                    <button id="p-10" class="btn" style="width:65px; padding:10px;" onclick="setPressure(10)">10s</button>
                    <button id="p-15" class="btn" style="width:65px; padding:10px;" onclick="setPressure(15)">15s</button>
                    <button id="p-20" class="btn" style="width:65px; padding:10px;" onclick="setPressure(20)">20s</button>
                    <button id="p-30" class="btn" style="width:65px; padding:10px;" onclick="setPressure(30)">30s</button>
                </div>
            </div>
            <div class="btn-list">
                <button id="mode-timeline" class="btn" onclick="setMode('timeline')">LÍNIA DEL TEMPS</button>
                <button id="mode-exact" class="btn" onclick="setMode('exact')">ANY EXACTE</button>
                <button id="mode-song" class="btn" onclick="setMode('song')">CANÇÓ</button>
                <button id="mode-artist" class="btn" onclick="setMode('artist')">GRUP</button>
                <button class="btn btn-primary" style="margin-top:10px;" onclick="startGame()">COMENÇAR JOC</button>
            </div>
        </div>
        <button class="btn" onclick="showScreen('landing-screen')">Tornar</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="turn-indicator-bar" style="background: var(--primary); color: white; padding: 12px; border-radius: 10px; font-weight: 900; width: 100%; display: flex; justify-content: center; align-items: center;"><span id="turn-text">...</span><span id="pressure-timer-display" style="display:none;">⏱️ 00</span></div>
        <div class="play-container"><svg class="progress-ring" width="110" height="110"><circle class="progress-ring__circle" stroke-width="5" fill="transparent" r="52" cx="55" cy="55" /></svg><button id="play-btn-main" onclick="handlePlayClick()"><div id="icon-play" style="width:0;height:0;border-top:18px solid transparent;border-bottom:18px solid transparent;border-left:28px solid white;margin-left:8px;"></div><div id="icon-stop" style="width:30px;height:30px;background:white;border-radius:4px;display:none;"></div></button></div>
        <div id="ui-timeline-mode" class="btn-list" style="display:none;"><div id="timeline-slots" style="display:flex; gap:5px; flex-wrap:wrap; justify-content:center;"></div></div>
        <div id="ui-input-mode" class="btn-list" style="display:none;"><input type="text" id="game-text-input" class="text-input-field" placeholder=""><button class="btn btn-primary" onclick="processInputGuess()">COMPROVAR</button></div>
        <div id="solution-card" style="display:none; flex-direction:column; align-items:center; width: 100%;">
            <div id="guess-result" style="font-weight:bold; font-size:1.5rem; margin-bottom:10px;"></div>
            <div id="song-details" style="display:none; flex-direction:column; align-items:center;">
                <div id="song-year" style="background:white; color:black; font-weight:900; font-size:2.5rem; padding:5px 30px; border-radius:10px;">----</div>
                <img id="album-img" style="width:160px; height:160px; border-radius:12px; box-shadow:0 5px 20px rgba(0,0,0,0.5); margin:10px 0;">
                <div id="song-title" style="font-weight:bold;"></div>
                <div id="song-artist" style="color:var(--primary);"></div>
            </div>
            <div id="action-buttons" class="btn-list" style="margin-top:15px;">
                <button id="btn-reveal-physical" class="btn btn-primary" style="display:none;" onclick="revealPhysicalSolution()">MOSTRAR SOLUCIÓ</button>
                <button id="btn-rob" class="btn btn-purple" style="display:none;" onclick="executeRobbery()">ROBAR CARTA 🚨</button>
                <button id="btn-next" class="btn btn-primary" style="display:none;" onclick="nextAction()">Següent Cançó</button>
                <div id="winner-actions" style="display:none; flex-direction:column; gap:10px;"><button class="btn btn-gold" onclick="playAgain()">JUGAR DE NOU</button><button class="btn" onclick="resetGame()">REINICIAR</button></div>
            </div>
        </div>
        <div id="game-board-container" style="width: 100%; margin-top: 20px;"></div>
        <button class="btn" style="margin-top:10px;" onclick="goToMenu()">Menú Principal</button>
    </div>

    <audio id="audio-player" preload="auto"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        let adminPreviewAudio = new Audio(), currentAdminBtn = null, publicPreviewAudio = new Audio(), currentPublicBtn = null;
        let html5QrCode = null, fadeInterval = null, animationFrame = null, pressureInterval = null;
        let currentYear = null, isFadingOutAuto = false, allExistingIds = [], databaseSongs = []; 
        let gameState = { players: [], currentTurn: 0, originalTurn: 0, mode: 'timeline', playedIds: [], winCondition: 5, isRobberyActive: false, robbersTried: [], pendingWinner: null, isOnline: false, pressureMode: 0 };

        const KEY = 'sonabe_v223', SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTSKbhu-nwl5Mrq1-_WiGPQyiflqbb3a5C9BRTTDWgwMNqTur9_8GBODKlJC9-OHol7EhIzap9Yv_lF/pub?output=csv";
        const ADMIN_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_jcMVHYvfhsHF5G8oLVym9RiNVMT25txw8asWEQDFcYf0trXkTOysUj0ujSA4hJ0F/exec"; 

        const circle = document.querySelector('.progress-ring__circle'), radius = circle.r.baseVal.value, circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`; circle.style.strokeDashoffset = circumference;

        function setProgress(percent) { circle.style.strokeDashoffset = circumference - (percent / 100 * circumference); }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function showLoader(txt) { document.getElementById('loading-overlay').style.display = 'flex'; document.getElementById('loading-text').innerText = txt; }
        function hideLoader() { document.getElementById('loading-overlay').style.display = 'none'; }
        function save() { localStorage.setItem(KEY, JSON.stringify(gameState)); }
        function load() { const s = localStorage.getItem(KEY); if (s) { try { gameState = JSON.parse(s); } catch(e){} } }
        function normalizeString(str) { return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim(); }

        function updateSmoothProgress() {
            if (!audio.paused && audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                setProgress(percent);
                if ((audio.duration - audio.currentTime) < 2 && !isFadingOutAuto) { isFadingOutAuto = true; performFadeOut(); }
                if ((audio.duration - audio.currentTime) < 5) { circle.style.stroke = "var(--primary)"; circle.style.opacity = Math.floor(audio.currentTime * 4) % 2 ? "1" : "0.2"; } 
                else { circle.style.stroke = "white"; circle.style.opacity = "1"; }
                animationFrame = requestAnimationFrame(updateSmoothProgress);
            }
        }

        async function loadTotalCount() {
            try {
                const r = await fetch(SHEET_CSV + "&t=" + Date.now()); const t = await r.text();
                databaseSongs = t.split("\n").filter(l => l.trim() !== "").slice(1).map(l => {
                    const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return { title: c[0]||"", artist: c[1]||"", year: c[3]||"", id: c[5]||"" };
                }).filter(s => s.id);
                allExistingIds = databaseSongs.map(s => s.id);
                document.getElementById('total-songs-display').innerText = `${allExistingIds.length} CANÇONS DISPONIBLES`;
            } catch(e) { document.getElementById('total-songs-display').innerText = "DATABASE ONLINE"; }
        }

        function handlePlayClick() {
            const pi = document.getElementById('icon-play'), si = document.getElementById('icon-stop'); clearInterval(fadeInterval);
            if (audio.paused) {
                pi.style.display = 'none'; si.style.display = 'block'; audio.volume = 0;
                audio.play().then(() => { updateSmoothProgress(); startPressureTimer(); fadeInterval = setInterval(() => { if (audio.volume < 0.9) audio.volume += 0.1; else clearInterval(fadeInterval); }, 50); });
            } else performFadeOut();
        }

        function performFadeOut(cb) {
            clearInterval(fadeInterval); fadeInterval = setInterval(() => {
                if (audio.volume > 0.1) audio.volume -= 0.1;
                else { audio.pause(); audio.volume = 1; resetPlayIcons(); clearInterval(fadeInterval); if (cb) cb(); }
            }, 50);
        }

        function resetPlayIcons() { document.getElementById('icon-play').style.display='block'; document.getElementById('icon-stop').style.display='none'; cancelAnimationFrame(animationFrame); circle.style.stroke="white"; setProgress(0); }
        audio.onended = () => resetPlayIcons();

        // --- SETUP & MODES ---
        function openSetup() { showScreen('setup-screen'); updateSetupList(); }
        function addPlayer() { const n = document.getElementById('player-input').value.trim(); if(n){ gameState.players.push({name:n, cards:[]}); document.getElementById('player-input').value=""; save(); updateSetupList(); } }
        function updateSetupList() {
            const l = document.getElementById('player-list-setup'); l.innerHTML = gameState.players.map((p,i) => `<div style="display:flex;justify-content:space-between;background:rgba(255,255,255,0.05);padding:10px;margin:5px;border-radius:8px;"><span>👤 ${p.name.toUpperCase()}</span><span style="color:red;cursor:pointer;" onclick="gameState.players.splice(${i},1);save();updateSetupList();">✕</span></div>`).join('');
            document.getElementById('config-area').style.display = gameState.players.length ? 'block' : 'none';
            document.getElementById('win-input').value = gameState.winCondition; setMode(gameState.mode); setPressure(gameState.pressureMode);
        }
        function setPressure(s) { gameState.pressureMode = s; ['p-off','p-10','p-15','p-20','p-30'].forEach(id => document.getElementById(id).className = 'btn'); document.getElementById(s === 0 ? 'p-off' : 'p-'+s).className = 'btn mode-selected'; save(); }
        function setMode(m) { gameState.mode = m; ['mode-timeline','mode-exact','mode-song','mode-artist'].forEach(id => document.getElementById(id).className = 'btn'); document.getElementById('mode-'+m).className = 'btn mode-selected'; save(); }
        function updateWinCondition() { gameState.winCondition = parseInt(document.getElementById('win-input').value) || 5; save(); }
        function startPressureTimer() {
            if (gameState.pressureMode <= 0 || gameState.isRobberyActive) return; clearInterval(pressureInterval);
            let t = gameState.pressureMode; const d = document.getElementById('pressure-timer-display');
            d.style.display = 'inline-block'; d.innerText = `⏱️ ${t}`;
            pressureInterval = setInterval(() => { t--; d.innerText = `⏱️ ${t}`; d.style.color = t <= 5 ? "var(--primary)" : "var(--gold)"; if(t <= 0) { clearInterval(pressureInterval); processResult(false); } }, 1000);
        }

        // --- GAME LOGIC ---
        async function startGame() { gameState.isOnline = true; if(!gameState.playedIds.length) gameState.players.forEach(p => p.cards = [1960 + Math.floor(Math.random()*60)]); save(); fetchNextSong(); }
        async function fetchNextSong() {
            showLoader("Buscant cançó..."); try {
                const r = await fetch(SHEET_CSV + "&t=" + Date.now()); const t = await r.text();
                const lines = t.split("\n").filter(l => l.trim() !== "").slice(1);
                const avail = lines.map(l => { const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); return {id:c[5]||"", yr:parseInt(c[3])}; }).filter(s => s.id && !gameState.playedIds.includes(s.id));
                const sel = avail[Math.floor(Math.random()*avail.length)]; gameState.playedIds.push(sel.id); loadSong(sel.id, sel.yr);
            } catch(e) { hideLoader(); }
        }

        async function loadSong(id, yr = null) {
            showLoader("Carregant..."); showScreen('game-screen'); resetPlayIcons(); isFadingOutAuto = false;
            try {
                const r = await fetch(`https://itunes.apple.com/lookup?id=${id}&country=es`); const d = await r.json(); const s = d.results[0];
                audio.src = s.previewUrl; audio.load(); document.getElementById('album-img').src = s.artworkUrl100.replace('100x100','600x600');
                document.getElementById('song-title').innerText = s.trackName; document.getElementById('song-artist').innerText = s.artistName;
                currentYear = yr || parseInt(s.releaseDate.substring(0,4)); document.getElementById('song-year').innerText = currentYear; renderGameUI();
            } catch(e) { hideLoader(); } finally { hideLoader(); }
        }

        function renderGameUI() {
            ['solution-card','song-details','btn-rob','btn-next','btn-reveal-physical','winner-actions','ui-timeline-mode','ui-input-mode'].forEach(id => document.getElementById(id).style.display = 'none');
            if (gameState.isOnline) {
                const p = gameState.players[gameState.currentTurn]; document.getElementById('turn-text').innerText = gameState.isRobberyActive ? `🚨 ROBATORI: ${p.name.toUpperCase()}` : `TORN DE: ${p.name.toUpperCase()}`;
                if (gameState.mode === 'timeline') { document.getElementById('ui-timeline-mode').style.display = 'block'; renderTimelineSlots(gameState.isRobberyActive ? gameState.players[gameState.originalTurn] : p); } 
                else { document.getElementById('ui-input-mode').style.display = 'block'; document.getElementById('game-text-input').value = ""; }
                renderBoards();
            } else { document.getElementById('turn-text').innerText = "MODE FÍSIC"; document.getElementById('solution-card').style.display = 'flex'; document.getElementById('guess-result').innerText = "CARTA ESCANEJADA"; document.getElementById('btn-reveal-physical').style.display = 'block'; }
        }

        function renderTimelineSlots(p) {
            const c = document.getElementById('timeline-slots'); c.innerHTML = ""; const s = [...p.cards].sort((a,b) => a-b);
            c.innerHTML += `<button class="btn" style="width:70px;padding:5px;" onclick="checkGuess(-1)">ANTIC</button>`;
            s.forEach((y, i) => { c.innerHTML += `<div style="background:white;color:black;padding:4px 8px;border-radius:6px;font-weight:bold;font-size:0.8rem;">${y}</div><button class="btn" style="width:70px;padding:5px;" onclick="checkGuess(${i})">${i===s.length-1?'NOU':'ENTRE'}</button>`; });
        }

        function checkGuess(idx) {
            const p = gameState.isRobberyActive ? gameState.players[gameState.originalTurn] : gameState.players[gameState.currentTurn], s = [...p.cards].sort((a,b) => a-b);
            let ok = idx === -1 ? currentYear <= s[0] : idx === s.length-1 ? currentYear >= s[s.length-1] : currentYear >= s[idx] && currentYear <= s[idx+1];
            processResult(ok);
        }

        function processInputGuess() {
            const v = document.getElementById('game-text-input').value; if(!v) return;
            let ok = false; if(gameState.mode==='exact') ok = parseInt(v)===currentYear;
            else if(gameState.mode==='song') ok = normalizeString(v)===normalizeString(document.getElementById('song-title').innerText);
            else if(gameState.mode==='artist') ok = normalizeString(v)===normalizeString(document.getElementById('song-artist').innerText);
            processResult(ok);
        }

        function processResult(ok) {
            clearInterval(pressureInterval); document.getElementById('pressure-timer-display').style.display='none';
            const t = gameState.players[gameState.currentTurn];
            if(ok) { t.cards.push(currentYear); const win = t.cards.length >= gameState.winCondition; save(); revealUI(true, false, win); }
            else {
                if(!gameState.isRobberyActive){ gameState.originalTurn = gameState.currentTurn; gameState.robbersTried = [gameState.currentTurn]; } else gameState.robbersTried.push(gameState.currentTurn);
                let next = -1; for(let i=1; i<gameState.players.length; i++){ let c = (gameState.originalTurn + i) % gameState.players.length; if(!gameState.robbersTried.includes(c)){ next = c; break; } }
                if(next !== -1){ gameState.nextRobberIdx = next; save(); revealUI(false, true, false); } else { save(); revealUI(false, false, false); }
            }
        }

        function revealUI(ok, canRob, win) {
            ['ui-timeline-mode','ui-input-mode'].forEach(id => document.getElementById(id).style.display = 'none'); document.getElementById('solution-card').style.display = 'flex';
            const r = document.getElementById('guess-result');
            if(ok){
                document.getElementById('song-details').style.display = "flex";
                if(win){ r.innerHTML="🏆 VICTÒRIA!"; r.style.color="#ffd700"; document.getElementById('winner-actions').style.display="flex"; confetti({particleCount:200, spread:80, origin:{y:0.6}}); }
                else { r.innerText="✅ ENCERTAT!"; r.style.color="#28a745"; document.getElementById('btn-next').style.display="block"; }
            } else { r.innerText="❌ INCORRECTE"; r.style.color="#fa2d48"; if(canRob) document.getElementById('btn-rob').style.display="block"; else { document.getElementById('song-details').style.display="flex"; document.getElementById('btn-next').style.display="block"; } }
        }

        function executeRobbery() { gameState.currentTurn = gameState.nextRobberIdx; gameState.isRobberyActive = true; save(); renderGameUI(); }
        function nextAction() { performFadeOut(() => { if(!gameState.isOnline) { startScanner(); return; } gameState.currentTurn = (gameState.originalTurn + 1) % gameState.players.length; gameState.originalTurn = gameState.currentTurn; gameState.isRobberyActive = false; gameState.robbersTried = []; save(); fetchNextSong(); }); }
        function playAgain() { performFadeOut(() => { gameState.playedIds = []; gameState.players.forEach(p => p.cards = []); gameState.currentTurn = 0; save(); startGame(); }); }
        function resetGame() { performFadeOut(() => { localStorage.removeItem(KEY); window.location.reload(); }); }
        function goToMenu() { performFadeOut(() => window.location.reload()); }
        function startScanner() {
            audio.play().then(() => audio.pause()).catch(()=>{}); document.getElementById('scanner-container').style.display = 'block'; html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: { width: 250, height: 250 } }, (text) => {
                const id = new URLSearchParams(text.split('?')[1]).get('id'); if(id){ if(navigator.vibrate) navigator.vibrate([200]); stopScanner(); gameState.isOnline=false; loadSong(id); }
            }).catch(() => stopScanner());
        }
        function stopScanner() { if(html5QrCode) html5QrCode.stop().then(() => document.getElementById('scanner-container').style.display = 'none'); }

        // --- CERCADOR PÚBLIC ---
        function openPublicSearch() { showScreen('public-search-screen'); document.getElementById('public-search-input').value = ""; document.getElementById('public-search-results').innerHTML = ""; }
        function closePublicSearch() { publicPreviewAudio.pause(); showScreen('landing-screen'); }
        async function togglePublicPreview(id, btn) {
            if (currentPublicBtn === btn) { publicPreviewAudio.pause(); btn.innerHTML = '<div class="play-icon-small"></div>'; currentPublicBtn = null; return; }
            if (currentPublicBtn) currentPublicBtn.innerHTML = '<div class="play-icon-small"></div>';
            currentPublicBtn = btn; btn.innerHTML = "⏳";
            try {
                const r = await fetch(`https://itunes.apple.com/lookup?id=${id}&country=es`); const d = await r.json();
                if (d.results[0].previewUrl) { btn.innerHTML = '■'; publicPreviewAudio.src = d.results[0].previewUrl; publicPreviewAudio.play(); publicPreviewAudio.onended = () => { btn.innerHTML = '<div class="play-icon-small"></div>'; currentPublicBtn = null; }; }
            } catch(e) { btn.innerHTML = "❌"; }
        }
        function performPublicSearch() {
            const t = normalizeString(document.getElementById('public-search-input').value); const res = document.getElementById('public-search-results'); if (!t || t.length < 2) { res.innerHTML = ""; return; }
            const m = databaseSongs.filter(s => normalizeString(s.title).includes(t) || normalizeString(s.artist).includes(t)).slice(0, 30);
            res.innerHTML = m.length ? m.map(s => `<div class="search-item"><button class="preview-btn-small" onclick="togglePublicPreview('${s.id}', this)"><div class="play-icon-small"></div></button><div style="flex:1"><b style="font-size:0.85rem;">${s.title}</b><br><span style="color:var(--primary);font-size:0.75rem;">${s.artist} (${s.year})</span></div></div>`).join('') : '<p style="color:#666;font-size:0.8rem;margin-top:20px;">Cap resultat.</p>';
        }

        // --- ADMIN RESTAURAT (RETAIL FORMAT) ---
        function checkAdminAccess() { if(prompt("Contrasenya admin:")==="admin") showScreen('admin-screen'); }
        function closeAdmin() { stopAdminPreview(); showScreen('landing-screen'); loadTotalCount(); }
        function stopAdminPreview() { adminPreviewAudio.pause(); if (currentAdminBtn) currentAdminBtn.innerHTML = '<div class="admin-play-icon"></div>'; currentAdminBtn = null; }
        function toggleAdminPreview(url, btn) {
            if (currentAdminBtn === btn) { stopAdminPreview(); return; } stopAdminPreview(); currentAdminBtn = btn; btn.innerHTML = '<div class="admin-stop-icon"></div>';
            adminPreviewAudio.src = url; adminPreviewAudio.play(); adminPreviewAudio.onended = () => stopAdminPreview();
        }
        async function searchITunes() {
            const term = document.getElementById('admin-search-input').value; if (!term) return; stopAdminPreview(); showLoader("Buscant...");
            try {
                const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=song&limit=20&country=es`); const d = await r.json();
                const container = document.getElementById('admin-results'); container.innerHTML = "";
                d.results.forEach(s => {
                    const sid = s.trackId.toString(), exists = allExistingIds.includes(sid);
                    const card = document.createElement('div'); card.id = `result-${sid}`; card.className = `admin-result-card ${exists ? 'admin-exists' : ''}`;
                    card.innerHTML = `
                        <button class="admin-preview-btn" onclick="toggleAdminPreview('${s.previewUrl}', this)"><div class="admin-play-icon"></div></button>
                        <img src="${s.artworkUrl100}" style="width:50px; height:50px; border-radius:8px;">
                        <div style="flex:1">
                            <b style="font-size:0.85rem">${s.trackName}</b><br>
                            <span style="font-size:0.75rem; color:#888">${s.artistName} (${s.releaseDate.substring(0,4)})</span>
                            <div id="status-${sid}">${exists ? '<span style="color:var(--primary);font-size:0.65rem;font-weight:bold;">EXISTENT</span>' : ''}</div>
                        </div>
                        <div id="action-${sid}">
                            ${!exists ? `<button class="btn btn-primary" style="width: auto; padding: 10px; font-size: 0.7rem;" onclick='addSongToSheet(${JSON.stringify(s).replace(/'/g, "&apos;")})'>AFEGIR</button>` : ''}
                        </div>`;
                    container.appendChild(card);
                });
            } catch(e) { alert("Error de connexió"); } finally { hideLoader(); }
        }
        async function addSongToSheet(s) {
            const sid = s.trackId.toString(), actionDiv = document.getElementById(`action-${sid}`); actionDiv.innerHTML = "⏳";
            const payload = { artista: s.artistName, titol: s.trackName, album: s.collectionName || "Single", any: s.releaseDate.substring(0,4), link: s.trackViewUrl, id: sid, genere: s.primaryGenreName };
            try {
                await fetch(ADMIN_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                allExistingIds.push(sid); document.getElementById(`status-${sid}`).innerHTML = '<span style="color:#28a745;font-size:0.7rem;font-weight:bold;">✅ ENVIADA!</span>';
                document.getElementById(`result-${sid}`).classList.add('admin-exists'); actionDiv.innerHTML = "";
            } catch(e) { alert("Error"); actionDiv.innerHTML = "❌"; }
        }

        window.onload = () => { load(); showScreen('landing-screen'); loadTotalCount(); };
    </script>
</body>
