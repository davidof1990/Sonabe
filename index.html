<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonabé! 🎶 - v244 scan reparat</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #fa2d48;
            --neon: #ff007f;
            --violet: #a020f0;
            --bg: #121212;
            --gold: #ffd700;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            overflow-x: hidden;
        }

        .neon-logo {
            font-weight: bold;
            font-size: 2.8rem;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px var(--neon);
            margin: 20px 0 5px 0;
        }

        .song-count-badge {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 30px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            gap: 15px;
            position: relative;
        }

        .active {
            display: flex;
        }

        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #444;
            color: #eee;
            padding: 16px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            width: 280px;
            transition: 0.2s;
            outline: none;
            box-sizing: border-box;
        }

        .btn-primary {
            background-color: var(--primary);
            border: none;
            color: white;
            box-shadow: 0 0 15px var(--primary);
        }

        .btn-purple {
            background-color: var(--violet) !important;
            color: white !important;
            box-shadow: 0 0 20px var(--violet) !important;
            border: none !important;
        }

        .btn-gold {
            background-color: var(--gold) !important;
            color: black !important;
            box-shadow: 0 0 25px var(--gold) !important;
            border: 2px solid white !important;
        }

        .btn-outline {
            border: 1px solid var(--neon);
            color: var(--neon);
            background: transparent;
        }

        .mode-selected {
            background-color: var(--neon) !important;
            color: white !important;
            border: 2px solid white !important;
            box-shadow: 0 0 20px var(--neon);
        }

        #scanner-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 5000;
            overflow: hidden;
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            background: black;
        }

        #reader video {
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
        }

        /* Amagar TOTS els elements visuals natius de html5-qrcode */
        #reader > *:not(video) {
            display: none !important;
        }
        #reader__scan_region,
        #reader__scan_region *,
        #reader__dashboard,
        #reader__dashboard *,
        #reader__header_message,
        #reader__status_span,
        #reader img,
        #reader svg,
        #reader div:not([style*="position: absolute"]) {
            display: none !important;
            border: none !important;
            background: transparent !important;
        }

        /* El recuadro rosa el posem per sobre amb z-index alt */
        .scan-line-container {
            width: 250px;
            height: 250px;
            border: 4px solid var(--neon);
            box-shadow: 0 0 25px var(--neon), inset 0 0 15px var(--neon);
            border-radius: 35px;
            position: relative;
            overflow: hidden;
            background: rgba(255, 0, 127, 0.05);
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: var(--neon);
            box-shadow: 0 0 20px var(--neon);
            top: 0;
            animation: scanAnim 2s ease-in-out infinite;
        }

        @keyframes scanAnim {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .player-row {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 5px solid var(--primary);
            text-align: left;
            width: 100%;
            box-sizing: border-box;
        }

        .active-row {
            border: 2px solid white !important;
            box-shadow: 0 0 15px var(--primary);
            background: #252525;
        }

        .admin-result-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #333;
            width: 100%;
            box-sizing: border-box;
        }

        .admin-exists {
            border-color: var(--violet) !important;
            box-shadow: 0 0 15px var(--violet);
            background: rgba(160, 32, 240, 0.05) !important;
        }

        .admin-preview-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #444;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .admin-play-icon {
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 10px solid white;
            margin-left: 3px;
        }

        .admin-stop-icon {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 2px;
        }

        .search-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            text-align: left;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            box-sizing: border-box;
        }

        .play-container {
            position: relative;
            width: 110px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
        }

        #play-btn-main {
            width: 90px;
            height: 90px;
            flex-shrink: 0;
            background-color: var(--primary);
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2;
            box-shadow: 0 0 15px var(--primary);
        }

        .progress-ring {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
            z-index: 1;
        }

        .progress-ring__circle {
            stroke: white;
            stroke-linecap: round;
        }

        #loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .config-group {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        .text-input-field {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 10px;
            border: 2px solid var(--neon);
            background: #222;
            color: white;
            text-align: center;
            outline: none;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text" style="margin-top:15px;">CARREGANT...</p>
    </div>

    <div id="scanner-container">
        <div id="reader"></div>
        <!-- Overlay visual per sobre del vídeo, pointer-events:none perquè no bloquegi l'escàner -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 5010;">
            <div class="scan-line-container">
                <div class="scan-line"></div>
            </div>
            <p style="margin-top: 30px; font-weight: bold; color: var(--neon); text-shadow: 0 0 10px var(--neon);">
                ENQUADRA EL BIDI</p>
        </div>
        <button class="btn"
            style="position:absolute; bottom:50px; left:50%; transform:translateX(-50%); z-index: 5200; background: #333; border: 1px solid var(--neon);"
            onclick="stopScanner()">CANCEL·LAR</button>
    </div>

    <div id="landing-screen" class="screen active">
        <div class="neon-logo">Sonabé!</div>
        <div id="total-songs-display" class="song-count-badge">CONNECTANT...</div>
        <div class="btn-list">
            <button class="btn btn-primary" onclick="startScanner()">Tinc les cartes! 📷</button>
            <button class="btn btn-outline" onclick="openSetup()">Jugar en línia 🎲</button>
            <button class="btn" style="border-color: var(--gold); color: var(--gold);"
                onclick="openPublicSearch()">Cercador cançons 🔍</button>
            <button class="btn" onclick="resetGame()">Reiniciar Tot</button>
            <div style="margin-top: 40px; opacity: 0.2; cursor: pointer; font-size: 0.8rem;"
                onclick="checkAdminAccess()">⚙️ ADMIN</div>
        </div>
    </div>

    <div id="public-search-screen" class="screen">
        <div class="neon-logo" style="font-size: 1.8rem;">Cercador</div>
        <div class="config-group"><input type="text" id="public-search-input" class="text-input-field"
                placeholder="Grup o cançó..." oninput="performPublicSearch()"></div>
        <div id="public-search-results" style="width: 100%; max-height: 450px; overflow-y: auto; padding: 5px;"></div>
        <button class="btn" onclick="closePublicSearch()">Tornar al Menú</button>
    </div>

    <div id="admin-screen" class="screen">
        <div class="neon-logo" style="font-size: 1.8rem;">Admin iTunes</div>
        <div class="config-group"><input type="text" id="admin-search-input" class="text-input-field"
                placeholder="Busca per afegir..."><button class="btn btn-primary" style="margin-top:10px; width: 100%;"
                onclick="searchITunes()">BUSCAR A ITUNES</button></div>
        <div id="admin-results" style="width: 100%; max-height: 400px; overflow-y: auto;"></div>
        <button class="btn" onclick="closeAdmin()">Tornar al Menú</button>
    </div>

    <div id="setup-screen" class="screen">
        <div class="neon-logo" style="font-size: 2.2rem;">Configuració</div>
        <div style="display:flex; gap:10px; width: 280px;"><input type="text" id="player-input"
                placeholder="Nom jugador..."
                style="flex:1; padding:12px; border-radius:10px; background:#222; color:white; border:1px solid var(--neon);"><button
                class="btn btn-primary" onclick="addPlayer()" style="width:60px; padding:0;">+</button></div>
        <div id="player-list-setup" style="width:100%; margin:10px 0;"></div>
        <div id="config-area" style="display:none; width: 100%;">
            <div class="config-group">
                <p style="font-size:0.75rem; font-weight:bold; color:#888;">CARTES PER GUANYAR:</p>
                <input type="number" id="win-input" value="10" min="2" max="20" oninput="updateWinCondition()"
                    style="width:80px; padding:10px; border-radius:10px; background:#222; color:white; text-align:center; border:1px solid #444;">
            </div>
            <div class="config-group">
                <p style="font-size:0.75rem; font-weight:bold; color:#888;">MODE PRESSIÓ:</p>
                <div style="display:flex; gap:5px; justify-content:center; flex-wrap: wrap;">
                    <button id="p-off" class="btn" style="width:65px; padding:10px;" onclick="setPressure(0)">OFF</button>
                    <button id="p-10" class="btn" style="width:65px; padding:10px;" onclick="setPressure(10)">10s</button>
                    <button id="p-15" class="btn" style="width:65px; padding:10px;" onclick="setPressure(15)">15s</button>
                    <button id="p-20" class="btn" style="width:65px; padding:10px;" onclick="setPressure(20)">20s</button>
                    <button id="p-30" class="btn" style="width:65px; padding:10px;" onclick="setPressure(30)">30s</button>
                </div>
            </div>
            <div class="btn-list">
                <button id="mode-timeline" class="btn" onclick="setMode('timeline')">LÍNIA DEL TEMPS</button>
                <button id="mode-exact" class="btn" onclick="setMode('exact')">ANY EXACTE</button>
                <button id="mode-song" class="btn" onclick="setMode('song')">CANÇÓ</button>
                <button id="mode-artist" class="btn" onclick="setMode('artist')">GRUP</button>
                <button class="btn btn-primary" style="margin-top:10px;" onclick="startGame()">COMENÇAR JOC</button>
            </div>
        </div>
        <button class="btn" onclick="showScreen('landing-screen')">Tornar</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="turn-indicator-bar"
            style="background: var(--primary); color: white; padding: 12px; border-radius: 10px; font-weight: 900; width: 100%; display: flex; justify-content: center; align-items: center;">
            <span id="turn-text">...</span><span id="pressure-timer-display" style="display:none; margin-left:10px;">⏱️ 00</span></div>
        <div class="play-container"><svg class="progress-ring" width="110" height="110">
                <circle class="progress-ring__circle" stroke-width="5" fill="transparent" r="52" cx="55" cy="55" />
            </svg><button id="play-btn-main" onclick="handlePlayClick()">
                <div id="icon-play"
                    style="width:0;height:0;border-top:18px solid transparent;border-bottom:18px solid transparent;border-left:28px solid white;margin-left:8px;">
                </div>
                <div id="icon-stop" style="width:30px;height:30px;background:white;border-radius:4px;display:none;">
                </div>
            </button></div>
        <div id="ui-timeline-mode" class="btn-list" style="display:none;">
            <div id="timeline-slots" style="display:flex; gap:5px; flex-wrap:wrap; justify-content:center;"></div>
        </div>
        <div id="ui-input-mode" class="btn-list" style="display:none;"><input type="text" id="game-text-input"
                class="text-input-field" placeholder=""><button class="btn btn-primary"
                style="margin-top:10px; width: 100%;" onclick="processInputGuess()">COMPROVAR</button></div>

        <div id="solution-card" style="display:none; flex-direction:column; align-items:center; width: 100%;">
            <div id="guess-result" style="font-weight:bold; font-size:1.5rem; margin-bottom:10px;"></div>
            <div id="song-details" style="display:none; flex-direction:column; align-items:center;">
                <div id="song-year"
                    style="background:white; color:black; font-weight:900; font-size:2.5rem; padding:5px 30px; border-radius:10px;">
                    ----</div>
                <img id="album-img"
                    style="width:160px; height:160px; border-radius:12px; box-shadow:0 5px 20px rgba(0,0,0,0.5); margin:10px 0;">
                <div id="song-title" style="font-weight:bold;"></div>
                <div id="song-artist" style="color:var(--primary);"></div>
            </div>
            <div id="action-buttons" class="btn-list" style="margin-top:15px;">
                <button id="btn-reveal-physical" class="btn btn-primary" style="display:none;"
                    onclick="revealPhysicalSolution()">MOSTRAR SOLUCIÓ</button>
                <button id="btn-rob" class="btn btn-purple" style="display:none;" onclick="executeRobbery()">ROBAR CARTA 🚨</button>
                <button id="btn-next" class="btn btn-primary" style="display:none;" onclick="nextAction()">Següent Cançó</button>
                <div id="winner-actions" style="display:none; flex-direction:column; gap:10px;"><button
                        class="btn btn-gold" onclick="playAgain()">JUGAR DE NOU</button><button class="btn"
                        onclick="resetGame()">REINICIAR</button></div>
            </div>
        </div>
        <div id="game-board-container" style="width: 100%; margin-top: 20px;"></div>
        <button class="btn" style="margin-top:10px;" onclick="goToMenu()">Menú Principal</button>
    </div>

    <audio id="audio-player" preload="auto"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        let adminPreviewAudio = new Audio(), currentAdminBtn = null, publicPreviewAudio = new Audio(), currentPublicBtn = null;
        let html5QrCode = null, fadeInterval = null, animationFrame = null, pressureInterval = null;
        let currentYear = null, isFadingOutAuto = false, allExistingIds = [], databaseSongs = [];
        let gameState = { players: [], currentTurn: 0, originalTurn: 0, mode: 'timeline', playedIds: [], winCondition: 10, isRobberyActive: false, robbersTried: [], pendingWinner: null, isOnline: false, pressureMode: 0 };

        const KEY = 'sonabe_v243', SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTSKbhu-nwl5Mrq1-_WiGPQyiflqbb3a5C9BRTTDWgwMNqTur9_8GBODKlJC9-OHol7EhIzap9Yv_lF/pub?output=csv";
        const ADMIN_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_jcMVHYvfhsHF5G8oLVym9RiNVMT25txw8asWEQDFcYf0trXkTOysUj0ujSA4hJ0F/exec";

        const circle = document.querySelector('.progress-ring__circle'), radius = circle.r.baseVal.value, circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`; circle.style.strokeDashoffset = circumference;

        function setProgress(percent) { circle.style.strokeDashoffset = circumference - (percent / 100 * circumference); }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function showLoader(txt) { document.getElementById('loading-overlay').style.display = 'flex'; document.getElementById('loading-text').innerText = txt; }
        function hideLoader() { document.getElementById('loading-overlay').style.display = 'none'; }
        function save() { localStorage.setItem(KEY, JSON.stringify(gameState)); }
        function load() { const s = localStorage.getItem(KEY); if (s) { try { gameState = JSON.parse(s); } catch (e) { } } }
        function normalizeString(str) { return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim(); }

        function revealPhysicalSolution() {
            document.getElementById('song-details').style.display = 'flex';
            document.getElementById('btn-reveal-physical').style.display = 'none';
            document.getElementById('btn-next').style.display = 'block';
        }

        function updateLandingCount() {
            const el = document.getElementById('total-songs-display');
            if (el) { el.innerText = `${allExistingIds.length} CANÇONS DISPONIBLES`; el.style.color = "var(--violet)"; setTimeout(() => el.style.color = "#888", 1000); }
        }

        async function loadTotalCount() {
            try {
                const r = await fetch(SHEET_CSV + "&t=" + Date.now()); const t = await r.text();
                const lines = t.split("\n").filter(l => l.trim() !== "").slice(1);
                databaseSongs = lines.map(l => {
                    const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return { title: c[0] || "", artist: c[1] || "", year: c[3] || "", id: c[5] || "" };
                }).filter(s => s.id);
                allExistingIds = databaseSongs.map(s => s.id.toString().trim());
                updateLandingCount();
            } catch (e) { document.getElementById('total-songs-display').innerText = "ERROR DATABASE"; }
        }

        function handlePlayClick() {
            const pi = document.getElementById('icon-play'), si = document.getElementById('icon-stop'); clearInterval(fadeInterval);
            if (audio.paused) {
                pi.style.display = 'none'; si.style.display = 'block'; audio.volume = 0;
                audio.play().then(() => { updateSmoothProgress(); startPressureTimer(); fadeInterval = setInterval(() => { if (audio.volume < 0.9) audio.volume += 0.1; else clearInterval(fadeInterval); }, 50); });
            } else performFadeOut();
        }

        function performFadeOut(cb) {
            clearInterval(fadeInterval); fadeInterval = setInterval(() => {
                if (audio.volume > 0.1) audio.volume -= 0.1;
                else { audio.pause(); audio.volume = 1; resetPlayIcons(); clearInterval(fadeInterval); if (cb) cb(); }
            }, 50);
        }

        function resetPlayIcons() { document.getElementById('icon-play').style.display = 'block'; document.getElementById('icon-stop').style.display = 'none'; cancelAnimationFrame(animationFrame); setProgress(0); }
        audio.onended = () => resetPlayIcons();

        function updateSmoothProgress() { if (!audio.paused && audio.duration) { const percent = (audio.currentTime / audio.duration) * 100; setProgress(percent); animationFrame = requestAnimationFrame(updateSmoothProgress); } }

        function openSetup() { showScreen('setup-screen'); updateSetupList(); }
        function addPlayer() { const n = document.getElementById('player-input').value.trim(); if (n) { gameState.players.push({ name: n, cards: [] }); document.getElementById('player-input').value = ""; save(); updateSetupList(); } }
        function updateSetupList() {
            const l = document.getElementById('player-list-setup');
            l.innerHTML = gameState.players.map((p, i) => `<div style="display:flex;justify-content:space-between;background:rgba(255,255,255,0.05);padding:10px;margin:5px;border-radius:8px;"><span>👤 ${p.name.toUpperCase()}</span><span style="color:red;cursor:pointer;" onclick="gameState.players.splice(${i},1);save();updateSetupList();">✕</span></div>`).join('');
            document.getElementById('config-area').style.display = gameState.players.length ? 'block' : 'none';
            setMode(gameState.mode); setPressure(gameState.pressureMode);
        }
        function setPressure(s) { gameState.pressureMode = s;['p-off', 'p-10', 'p-15', 'p-20', 'p-30'].forEach(id => { if (document.getElementById(id)) document.getElementById(id).className = 'btn'; }); const target = s === 0 ? 'p-off' : 'p-' + s; if (document.getElementById(target)) document.getElementById(target).className = 'btn mode-selected'; save(); }
        function setMode(m) { gameState.mode = m;['mode-timeline', 'mode-exact', 'mode-song', 'mode-artist'].forEach(id => document.getElementById(id).className = 'btn'); document.getElementById('mode-' + m).className = 'btn mode-selected'; save(); }
        function updateWinCondition() { gameState.winCondition = parseInt(document.getElementById('win-input').value) || 10; save(); }
        function startPressureTimer() { if (gameState.pressureMode <= 0 || gameState.isRobberyActive) return; clearInterval(pressureInterval); let t = gameState.pressureMode; const d = document.getElementById('pressure-timer-display'); d.style.display = 'inline-block'; d.innerText = `⏱️ ${t}`; pressureInterval = setInterval(() => { t--; d.innerText = `⏱️ ${t}`; if (t <= 0) { clearInterval(pressureInterval); processResult(false); } }, 1000); }

        async function startGame() { gameState.isOnline = true; if (!gameState.playedIds.length) gameState.players.forEach(p => p.cards = [1960 + Math.floor(Math.random() * 60)]); save(); fetchNextSong(); }
        async function fetchNextSong() { showLoader("Buscant cançó..."); try { const r = await fetch(SHEET_CSV + "&t=" + Date.now()); const t = await r.text(); const lines = t.split("\n").filter(l => l.trim() !== "").slice(1); const avail = lines.map(l => { const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); return {id:c[5]||"", yr:parseInt(c[3])}; }).filter(s => s.id && !gameState.playedIds.includes(s.id)); const sel = avail[Math.floor(Math.random() * avail.length)]; gameState.playedIds.push(sel.id); loadSong(sel.id, sel.yr); } catch (e) { hideLoader(); } }
        async function loadSong(id, yr = null) { showLoader("Carregant..."); showScreen('game-screen'); resetPlayIcons(); isFadingOutAuto = false; try { const r = await fetch(`https://itunes.apple.com/lookup?id=${id}&country=es`); const d = await r.json(); const s = d.results[0]; audio.src = s.previewUrl; audio.load(); document.getElementById('album-img').src = s.artworkUrl100.replace('100x100', '600x600'); document.getElementById('song-title').innerText = s.trackName; document.getElementById('song-artist').innerText = s.artistName; currentYear = yr || parseInt(s.releaseDate.substring(0, 4)); document.getElementById('song-year').innerText = currentYear; renderGameUI(); } catch (e) { hideLoader(); } finally { hideLoader(); } }

        function renderGameUI() {
            ['solution-card', 'song-details', 'btn-rob', 'btn-next', 'btn-reveal-physical', 'winner-actions', 'ui-timeline-mode', 'ui-input-mode'].forEach(id => document.getElementById(id).style.display = 'none');
            if (gameState.isOnline) {
                const p = gameState.players[gameState.currentTurn];
                document.getElementById('turn-text').innerText = gameState.isRobberyActive ? `🚨 ROBATORI: ${p.name.toUpperCase()}` : `TORN DE: ${p.name.toUpperCase()}`;
                if (gameState.mode === 'timeline') { document.getElementById('ui-timeline-mode').style.display = 'block'; renderTimelineSlots(gameState.isRobberyActive ? gameState.players[gameState.originalTurn] : p); }
                else { document.getElementById('ui-input-mode').style.display = 'block'; document.getElementById('game-text-input').value = ""; }
                renderBoards();
            } else {
                document.getElementById('turn-text').innerText = "MODE FÍSIC"; document.getElementById('solution-card').style.display = 'flex'; document.getElementById('guess-result').innerText = "CARTA ESCANEJADA"; document.getElementById('btn-reveal-physical').style.display = 'block'; document.getElementById('game-board-container').style.display = 'none';
            }
        }

        function renderTimelineSlots(p) { const c = document.getElementById('timeline-slots'); c.innerHTML = ""; const s = [...p.cards].sort((a, b) => a - b); c.innerHTML += `<button class="btn" style="width:70px;padding:5px;" onclick="checkGuess(-1)">ANTIC</button>`; s.forEach((y, i) => { c.innerHTML += `<div style="background:white;color:black;padding:4px 8px;border-radius:6px;font-weight:bold;font-size:0.8rem;">${y}</div><button class="btn" style="width:70px;padding:5px;" onclick="checkGuess(${i})">${i === s.length - 1 ? 'NOU' : 'ENTRE'}</button>`; }); }
        function checkGuess(idx) { const p = gameState.isRobberyActive ? gameState.players[gameState.originalTurn] : gameState.players[gameState.currentTurn], s = [...p.cards].sort((a, b) => a - b); let ok = idx === -1 ? currentYear <= s[0] : idx === s.length - 1 ? currentYear >= s[s.length - 1] : currentYear >= s[idx] && currentYear <= s[idx + 1]; processResult(ok); }
        function processInputGuess() { const v = document.getElementById('game-text-input').value; if (!v) return; let ok = false; if (gameState.mode === 'exact') ok = parseInt(v) === currentYear; else if (gameState.mode === 'song') ok = normalizeString(v) === normalizeString(document.getElementById('song-title').innerText); else if (gameState.mode === 'artist') ok = normalizeString(v) === normalizeString(document.getElementById('song-artist').innerText); processResult(ok); }
        function processResult(ok) { clearInterval(pressureInterval); if (document.getElementById('pressure-timer-display')) document.getElementById('pressure-timer-display').style.display = 'none'; const t = gameState.players[gameState.currentTurn]; if (ok) { t.cards.push(currentYear); const win = t.cards.length >= gameState.winCondition; save(); revealUI(true, false, win); } else { if (!gameState.isRobberyActive) { gameState.originalTurn = gameState.currentTurn; gameState.robbersTried = [gameState.currentTurn]; } else gameState.robbersTried.push(gameState.currentTurn); let next = -1; for (let i = 1; i < gameState.players.length; i++) { let c = (gameState.originalTurn + i) % gameState.players.length; if (!gameState.robbersTried.includes(c)) { next = c; break; } } if (next !== -1) { gameState.nextRobberIdx = next; save(); revealUI(false, true, false); } else { save(); revealUI(false, false, false); } } }
        function revealUI(ok, canRob, win) { ['ui-timeline-mode', 'ui-input-mode'].forEach(id => document.getElementById(id).style.display = 'none'); document.getElementById('solution-card').style.display = 'flex'; const r = document.getElementById('guess-result'); if (ok) { document.getElementById('song-details').style.display = "flex"; if (win) { r.innerHTML = "🏆 VICTÒRIA!"; r.style.color = "#ffd700"; document.getElementById('winner-actions').style.display = "flex"; confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } }); } else { r.innerText = "✅ ENCERTAT!"; r.style.color = "#28a745"; document.getElementById('btn-next').style.display = "block"; } } else { r.innerText = "❌ INCORRECTE"; r.style.color = "#fa2d48"; if (canRob) document.getElementById('btn-rob').style.display = "block"; else { document.getElementById('song-details').style.display = "flex"; document.getElementById('btn-next').style.display = "block"; } } }
        function executeRobbery() { gameState.currentTurn = gameState.nextRobberIdx; gameState.isRobberyActive = true; save(); renderGameUI(); }
        function nextAction() { performFadeOut(() => { if (!gameState.isOnline) { startScanner(false); return; } gameState.currentTurn = (gameState.originalTurn + 1) % gameState.players.length; gameState.originalTurn = gameState.currentTurn; gameState.isRobberyActive = false; gameState.robbersTried = []; save(); fetchNextSong(); }); }

        function renderBoards() {
            const container = document.getElementById('game-board-container'); if (!container) return; container.style.display = 'block';
            container.innerHTML = `<h3 style="font-size: 0.9rem; color: var(--gold);">OBJECTIU: ${gameState.winCondition} CARTES</h3>`;
            gameState.players.forEach((p, i) => {
                const isActive = (i === (gameState.isRobberyActive ? gameState.originalTurn : gameState.currentTurn));
                const sortedCards = [...p.cards].sort((a, b) => a - b);
                container.innerHTML += `<div class="player-row ${isActive ? 'active-row' : ''}"><div style="font-size:0.75rem; font-weight:bold; color:var(--primary); margin-bottom: 5px;">${isActive ? '▶ ' : ''}${p.name.toUpperCase()} (${p.cards.length})</div><div style="display:flex; gap:4px; flex-wrap:wrap;">${sortedCards.map(y => `<div style="background:white; color:black; padding:2px 6px; border-radius:4px; font-size:0.7rem; font-weight:bold;">${y}</div>`).join('')}</div></div>`;
            });
        }

        let qrObserver = null;

        function nukeNativeQROverlay() {
            const reader = document.getElementById('reader');
            if (!reader) return;
            // Eliminar imatges, svgs i canvas injectats per la llibreria
            reader.querySelectorAll('img, svg, canvas').forEach(el => el.remove());
            const scanRegion = document.getElementById('reader__scan_region');
            if (scanRegion) scanRegion.querySelectorAll('img, svg, div').forEach(el => el.remove());
            const dashboard = document.getElementById('reader__dashboard');
            if (dashboard) dashboard.style.display = 'none';
        }

        function startScanner(cancelGoesHome = true) {
            document.getElementById('scanner-container').style.display = 'block';
            // Guardar context per saber on tornar en cancel·lar
            document.getElementById('scanner-container').dataset.cancelGoesHome = cancelGoesHome;
            html5QrCode = new Html5Qrcode("reader");

            // MutationObserver: elimina qualsevol element nou que injecti la llibreria
            qrObserver = new MutationObserver(() => nukeNativeQROverlay());
            qrObserver.observe(document.getElementById('reader'), { childList: true, subtree: true });

            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 20, qrbox: { width: 250, height: 250 } },
                (text) => {
                    const id = new URLSearchParams(text.split('?')[1]).get('id');
                    if (id) { stopScanner(false); gameState.isOnline = false; loadSong(id); }
                }
            ).catch(() => stopScanner());
        }

        function stopScanner(returnToMenu = null) {
            if (qrObserver) { qrObserver.disconnect(); qrObserver = null; }
            const goHome = returnToMenu !== null ? returnToMenu : (document.getElementById('scanner-container').dataset.cancelGoesHome !== 'false');
            // Amagar i navegar immediatament, sense esperar la Promise
            document.getElementById('scanner-container').style.display = 'none';
            if (goHome) showScreen('landing-screen');
            else showScreen('game-screen');
            // Aturar la càmera en segon pla
            if (html5QrCode) { html5QrCode.stop().catch(() => {}); html5QrCode = null; }
        }
        
        // --- CERCADOR PÚBLIC ---
        function openPublicSearch() { showScreen('public-search-screen'); }
        function closePublicSearch() { publicPreviewAudio.pause(); showScreen('landing-screen'); }
        function performPublicSearch() { 
            const t = normalizeString(document.getElementById('public-search-input').value); 
            const res = document.getElementById('public-search-results'); 
            if (!t || t.length < 2) { res.innerHTML = ""; return; } 
            const m = databaseSongs.filter(s => normalizeString(s.title).includes(t) || normalizeString(s.artist).includes(t)).slice(0, 20); 
            res.innerHTML = m.map(s => `
                <div class="search-item">
                    <button class="admin-preview-btn" onclick="togglePublicPreview('${s.id}', this)"><div class="admin-play-icon"></div></button>
                    <div style="flex:1"><b>${s.title}</b><br><span style="color:var(--primary); font-size:0.75rem;">${s.artist} (${s.year})</span></div>
                </div>`).join(''); 
        }
        async function togglePublicPreview(id, btn) {
            if (currentPublicBtn === btn) { publicPreviewAudio.pause(); btn.innerHTML = '<div class="admin-play-icon"></div>'; currentPublicBtn = null; return; }
            if (currentPublicBtn) currentPublicBtn.innerHTML = '<div class="admin-play-icon"></div>';
            currentPublicBtn = btn; btn.innerHTML = "⏳";
            try {
                const r = await fetch(`https://itunes.apple.com/lookup?id=${id}&country=es`); const d = await r.json();
                if (d.results[0].previewUrl) {
                    btn.innerHTML = '<div class="admin-stop-icon"></div>';
                    publicPreviewAudio.src = d.results[0].previewUrl; publicPreviewAudio.play();
                    publicPreviewAudio.onended = () => { btn.innerHTML = '<div class="admin-play-icon"></div>'; currentPublicBtn = null; };
                }
            } catch(e) { btn.innerHTML = "❌"; }
        }
        
        // ADMIN ITUNES
        function checkAdminAccess() { if (prompt("Contrasenya admin:") === "admin") showScreen('admin-screen'); }
        function closeAdmin() { showScreen('landing-screen'); loadTotalCount(); }
        async function searchITunes() {
            const term = document.getElementById('admin-search-input').value; if (!term) return; showLoader("Buscant...");
            try {
                const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=song&limit=25&country=es`); const d = await r.json();
                const container = document.getElementById('admin-results'); container.innerHTML = "";
                d.results.forEach(s => {
                    const sid = s.trackId.toString(); const exists = allExistingIds.includes(sid);
                    const card = document.createElement('div'); card.className = `admin-result-card ${exists ? 'admin-exists' : ''}`;
                    card.innerHTML = `<button class="admin-preview-btn" onclick="toggleAdminPreview('${s.previewUrl}', this)"><div class="admin-play-icon"></div></button><img src="${s.artworkUrl100}" style="width:50px; border-radius:8px;"><div style="flex:1"><b>${s.trackName}</b><br><small>${s.artistName}</small></div>`;
                    container.appendChild(card);
                });
            } catch (e) { } finally { hideLoader(); }
        }
        function toggleAdminPreview(url, btn) { if (currentAdminBtn === btn) { adminPreviewAudio.pause(); btn.innerHTML = '<div class="admin-play-icon"></div>'; currentAdminBtn = null; return; } if (currentAdminBtn) currentAdminBtn.innerHTML = '<div class="admin-play-icon"></div>'; currentAdminBtn = btn; adminPreviewAudio.src = url; adminPreviewAudio.play(); btn.innerHTML = '<div class="admin-stop-icon"></div>'; adminPreviewAudio.onended = () => { btn.innerHTML = '<div class="admin-play-icon"></div>'; currentAdminBtn = null; }; }

        function resetGame() { localStorage.removeItem(KEY); window.location.reload(); }
        function playAgain() { gameState.players.forEach(p => p.cards = []); gameState.playedIds = []; save(); startGame(); }
        function goToMenu() { window.location.reload(); }
        window.onload = () => { load(); showScreen('landing-screen'); loadTotalCount(); };
    </script>
</body>
